name: Signal accuracy tracking

on:
  schedule:
    # Daily at 06:30 UTC (after market close everywhere, before US open)
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-accuracy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Capture signals and evaluate 30-day outcomes
        run: python backend/accuracy.py

      - name: Refresh committed signals.json from live API
        run: python backend/refresh_committed_signals.py

      - name: Commit updated history and signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_history.json signals.json
          git diff --staged --quiet || git commit -m "chore: update signal accuracy history $(date -u '+%Y-%m-%d')"
          git push
