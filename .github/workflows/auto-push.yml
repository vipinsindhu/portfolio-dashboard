name: Auto-push major changes

on:
  push:
    branches: [main, develop]

jobs:
  verify-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Check for significant changes
        id: check
        run: |
          # Get the last commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last commit: $COMMIT_MSG"

          # Check if commit contains keywords for major changes
          if echo "$COMMIT_MSG" | grep -iE "(feat:|fix:|refactor:|Phase|Integration|✅|Complete)" > /dev/null; then
            echo "major_change=true" >> $GITHUB_OUTPUT
          else
            echo "major_change=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure push to origin
        if: steps.check.outputs.major_change == 'true'
        run: |
          # Verify we're on a tracked branch
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "On branch: $BRANCH"

          # Push to origin
          git push origin $BRANCH || echo "Already up to date"

      - name: Log workflow status
        run: |
          echo "✅ Workflow completed"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Last commit: $(git log -1 --oneline)"
