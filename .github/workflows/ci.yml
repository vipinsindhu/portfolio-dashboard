name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: python -m pytest backend/tests -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start app (serves committed frontend/dist)
        run: |
          nohup python app.py > app.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5000/api/health > /dev/null; then
              echo "App is up"; break
            fi
            sleep 2
          done
          curl -fs http://localhost:5000/api/health

      - name: Run smoke tests
        working-directory: tests/e2e
        run: node smoke.js
        env:
          SMOKE_URL: http://localhost:5000

      - name: Show app log on failure
        if: failure()
        run: cat app.log
