name: Refresh Portfolio Dashboard

on:
  schedule:
    # Every Sunday at 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:   # manual trigger from GitHub UI anytime

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Generate dashboard
        run: python generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard $(date -u '+%Y-%m-%d')"
          git push

      - name: Send email notification
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
          DASHBOARD_URL:  ${{ secrets.DASHBOARD_URL }}
        run: python send_email.py
