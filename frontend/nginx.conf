server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    # Serve index.html for all routes (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API proxy configuration
    # Backend URL can be passed via BACKEND_URL environment variable or via location header
    # Default: localhost:5000 for local development
    location /api/ {
        # Enable DNS resolution for container/service discovery
        resolver 127.0.0.11 valid=10s;
        resolver_timeout 5s;

        # Use environment variable for backend URL (replaced at startup via envsubst)
        # Defaults to portfolio-backend:5000 for Docker, can be overridden via BACKEND_URL env var
        set $backend "BACKEND_URL_PLACEHOLDER";

        proxy_pass $backend;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
